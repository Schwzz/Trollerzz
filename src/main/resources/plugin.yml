name: TrollSystem
version: 1.0.0
main: com.swartzz.troll.TrollPlugin
api-version: 1.20
author: Swartzz
commands:
  troll:
    description: Open the troll system menu
    usage: /troll <player|open|reset>
    permission: troll.use
permissions:
  troll.use:
    description: Allows use of all troll commands
    default: op